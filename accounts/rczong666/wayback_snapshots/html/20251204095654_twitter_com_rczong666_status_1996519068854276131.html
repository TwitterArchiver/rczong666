<!DOCTYPE html>
<html>
<head>

<title>

</title>
<style type="text/css">
body {
				margin:0;
				padding: 20px;
				background-color: #000;
				min-height: 100vh;
				box-sizing: border-box;
			}
  .notice {
    border: 2px solid #c9ae00;
    background-color: #ffff00;
    padding: 12px;
    position: sticky;
    top: 20px;
    z-index: 1000;
  }

  .tweet-container {
    font-family: Helvetica, Arial, sans-serif;
    padding: 12px 16px;
    border: 1px solid #cfd9de;
    border-radius: 12px;
    margin-top: 20px;
				margin-left: auto;
				margin-right: auto;
				background-color: white;
    max-width: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    max-width: max-content;
  }

  .tweet-container > #nonjsonview {
    max-width: 600px;
    margin-left: auto;
    margin-right: auto;

  }

  .tweet-author {
    display: flex;
    flex-direction: row;
    align-items: center;
    padding-bottom: 0.75rem;
  }

  .tweet-author-profile-image img {
    width: 48px;
    max-width: 48px;
    height: 48px;
    max-height: 48px;
    overflow: hidden;
    border-radius: 50%;
    margin-right: 5px;
  }

  .tweet-author-info {
    display: flex;
    flex-direction: column;
  }

  .tweet-author-name {
    font-weight: bold;
  }

  .tweet-content {
    font-size: 1.25rem;
  }

			.tweet-image {
				width: 100%;
				height: auto;
				margin-top: 12px;
				border-radius: 12px;
			}

			.embedded-tweet-container {
				box-sizing: border-box;
				margin-top: 12px;
				padding: 12px;
				border: 1px solid #cfd9de;
    border-radius: 12px;
				background-color: white;
				max-width: 100%;
			}
			.date {
				font-size: 0.75rem;
				color: #657786;
				margin-top: 12px;
			}
			.date a {
				color: #657786;
				text-decoration: none;
			}
			.date a:hover {
				text-decoration: underline;
			}
  .on {
    display: block;
  }
  .off {
    display: none;
  }
</style>
</head>
<body>
<div class="tweet-container on">
<div id="nonjsonview">
  <div class="tweet-author">
  <div class="tweet-author-profile-image">
  <img alt="Forget-Me-Not" src="../avatar/avatar_1996278257709395968.jpg"/>
  </div>
  <div class="tweet-author-info">
  <div class="tweet-author-name">
  Forget-Me-Not
  </div>
  <div class="tweet-author-username">
  @rczong666
  </div>
  </div>
  </div>
  <div class="tweet-content">
  主角目睹自己的好友遭到杀害，穿越到一段时间前，试图改变结局，如果是你，你会怎么写
  <br/>
  ①就算主角知道这件事会发生，但无论主角作何努力，也改变不了最后的结局
  <br/>
  ②时间线发生变动，好友被杀这件事没有发生（比如杀害好友的人因病去世）
  <br/>
  ③主角成功救下好友
  <br/>
  ④主角和杀害好友的人一同穿越了时间
  <!-- If there's a quoted tweet, embed it here!-->
  <p class="date">
  <a href="/" id="parentdate">
  </a>
  </p>
  </div>
</div>
</div>
<script>
var dateString = "2025-12-04T09:56:54.000Z";
  var date = new Date(dateString);
  var currentURL = window.location.href;
  document.querySelector("#parentdate").innerText = date;
  document.querySelector("#parentdate").href = currentURL;
</script>
</body>
